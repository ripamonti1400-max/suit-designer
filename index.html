<script>

const blazer = document.querySelector('.blazer');
const armLeft = document.querySelector('.armLeft');
const armRight = document.querySelector('.armRight');
const shirt = document.querySelector('.shirt');
const legLeft = document.querySelector('.legLeft');
const legRight = document.querySelector('.legRight');
const buttons = document.querySelectorAll('.button');
const pocketSquare = document.querySelector('.pocketSquare');
const embroidery = document.querySelector('.embroidery');

const avatar = document.getElementById('avatar');

let rotateX = -5;
let rotateY = 15;
let dragging = false;
let startX;
let startY;

avatar.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

avatar.addEventListener('mousedown',(e)=>{
dragging = true;
startX = e.clientX;
startY = e.clientY;
});

window.addEventListener('mouseup',()=>{
dragging = false;
});

window.addEventListener('mousemove',(e)=>{

if(!dragging) return;

rotateY += (e.clientX - startX) * 0.4;
rotateX -= (e.clientY - startY) * 0.2;

avatar.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

startX = e.clientX;
startY = e.clientY;

});


document.querySelectorAll('.color').forEach(color=>{

color.addEventListener('click',()=>{

const type = color.dataset.type;
const value = color.dataset.color;

if(type==='blazer'){
blazer.style.background = value;
armLeft.style.background = value;
armRight.style.background = value;
}

if(type==='shirt'){
shirt.style.background = value;
}

if(type==='pants'){
legLeft.style.background = value;
legRight.style.background = value;
}

});

});


document.getElementById('buttonColor').addEventListener('change',(e)=>{

buttons.forEach(btn=>{
btn.style.background = e.target.value;
});

});


document.getElementById('buttonSize').addEventListener('input',(e)=>{

buttons.forEach(btn=>{
btn.style.width = e.target.value + 'px';
btn.style.height = e.target.value + 'px';
});

});


document.getElementById('pocketSquareSelect').addEventListener('change',(e)=>{

if(e.target.value==='none'){
pocketSquare.style.display = 'none';
}
else{
pocketSquare.style.display = 'block';
pocketSquare.style.background = e.target.value;
}

});


document.getElementById('embroideryInput').addEventListener('input',(e)=>{
embroidery.innerText = e.target.value;
});


document.getElementById('saveBtn').addEventListener('click',()=>{

const data = {
blazer: blazer.style.background,
shirt: shirt.style.background,
pants: legLeft.style.background
};

localStorage.setItem('suitDesign', JSON.stringify(data));

alert('Design Saved');

});

</script>
