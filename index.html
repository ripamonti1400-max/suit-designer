<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Bespoke Suit Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#0f0f0f;
font-family:'Inter',sans-serif;
color:white;
}

#app{
display:flex;
height:100vh;
width:100%;
}

#sidebar{
width:380px;
background:rgba(20,20,20,0.95);
backdrop-filter:blur(20px);
padding:30px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:34px;
font-family:'Playfair Display',serif;
margin-bottom:10px;
}

.subtitle{
opacity:0.6;
margin-bottom:30px;
font-size:14px;
}

.section{
margin-bottom:28px;
}

.section h3{
margin-bottom:14px;
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
color:#d4af37;
}

.colors{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.color{
width:34px;
height:34px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.2);
cursor:pointer;
transition:0.2s;
}

.color:hover{
transform:scale(1.1);
}

select,
input{
width:100%;
padding:14px;
background:#1f1f1f;
border:none;
border-radius:12px;
color:white;
font-size:14px;
}

button{
width:100%;
padding:16px;
background:#d4af37;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
margin-top:20px;
font-size:15px;
}

#viewer{
flex:1;
position:relative;
background:
radial-gradient(circle at center,#2a2a2a 0%,#111 70%);
display:flex;
justify-content:center;
align-items:center;
perspective:1800px;
}

#avatar{
position:relative;
width:320px;
height:760px;
transform-style:preserve-3d;
transition:transform 0.08s linear;
}

.shadow{
position:absolute;
width:260px;
height:40px;
background:rgba(0,0,0,0.4);
border-radius:50%;
bottom:-10px;
left:30px;
filter:blur(20px);
}

.head{
position:absolute;
width:110px;
height:135px;
background:#efc29a;
border-radius:55px;
left:105px;
top:0;
z-index:10;
box-shadow:
inset -10px -10px rgba(0,0,0,0.08),
0 10px 20px rgba(0,0,0,0.3);
}

.hair{
position:absolute;
width:120px;
height:60px;
background:#1a1a1a;
left:100px;
top:-5px;
border-radius:60px 60px 20px 20px;
z-index:11;
}

.neck{
position:absolute;
width:40px;
height:40px;
background:#efc29a;
left:140px;
top:120px;
z-index:5;
}

.shirt{
position:absolute;
width:130px;
height:240px;
background:white;
left:95px;
top:165px;
border-radius:20px;
z-index:2;
box-shadow:inset -10px -10px rgba(0,0,0,0.05);
}

.tie{
position:absolute;
width:26px;
height:170px;
background:black;
left:147px;
top:185px;
clip-path:polygon(50% 0%,100% 12%,70% 100%,30% 100%,0 12%);
z-index:4;
}

.blazer{
position:absolute;
width:220px;
height:300px;
background:#1f2a44;
left:50px;
top:150px;
border-radius:28px;
z-index:3;
box-shadow:
0 25px 35px rgba(0,0,0,0.5),
inset -15px -15px rgba(0,0,0,0.12);
}

.lapelLeft,
.lapelRight{
position:absolute;
width:65px;
height:170px;
background:#101826;
top:0;
}

.lapelLeft{
left:24px;
clip-path:polygon(0 0,100% 0,0 100%);
}

.lapelRight{
right:24px;
clip-path:polygon(100% 0,100% 100%,0 0);
}

.armLeft,
.armRight{
position:absolute;
width:58px;
height:240px;
background:#1f2a44;
top:180px;
border-radius:30px;
z-index:1;
box-shadow:inset -8px -8px rgba(0,0,0,0.12);
}

.armLeft{
left:12px;
transform:rotateZ(7deg);
}

.armRight{
right:12px;
transform:rotateZ(-7deg);
}

.handLeft,
.handRight{
position:absolute;
width:40px;
height:40px;
background:#efc29a;
border-radius:50%;
top:400px;
z-index:0;
}

.handLeft{
left:20px;
}

.handRight{
right:20px;
}

.buttons{
position:absolute;
left:105px;
top:70px;
}

.btn{
width:14px;
height:14px;
background:gold;
border-radius:50%;
margin-bottom:18px;
}

.pocketSquare{
position:absolute;
width:26px;
height:22px;
background:red;
right:35px;
top:75px;
border-radius:3px;
}

.embroidery{
position:absolute;
left:34px;
top:76px;
font-size:15px;
font-weight:700;
color:white;
}

.pants{
position:absolute;
width:150px;
height:310px;
left:85px;
top:435px;
z-index:0;
}

.legLeft,
.legRight{
position:absolute;
width:64px;
height:290px;
background:#2b2b2b;
border-radius:14px;
box-shadow:inset -6px -6px rgba(0,0,0,0.1);
}

.legRight{
right:0;
}

.shoeLeft,
.shoeRight{
position:absolute;
width:74px;
height:28px;
background:black;
border-radius:16px;
bottom:-10px;
}

.shoeRight{
right:-5px;
}

.fabricCard{
padding:14px;
background:#1d1d1d;
border-radius:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,0.06);
}

.price{
position:absolute;
top:30px;
right:30px;
padding:18px 24px;
background:rgba(0,0,0,0.55);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:18px;
font-size:28px;
font-weight:700;
}

</style>
</head>

<body>

<div id="app">

<div id="sidebar">

<div class="logo">BESPOKE.</div>
<div class="subtitle">Luxury Custom Suit Configurator</div>

<div class="section">
<h3>Blazer Fabric</h3>

<div class="colors">
<div class="color" style="background:#1f2a44" data-type="blazer" data-color="#1f2a44"></div>
<div class="color" style="background:#000" data-type="blazer" data-color="#000"></div>
<div class="color" style="background:#355c4b" data-type="blazer" data-color="#355c4b"></div>
<div class="color" style="background:#8b4513" data-type="blazer" data-color="#8b4513"></div>
<div class="color" style="background:#5f5f5f" data-type="blazer" data-color="#5f5f5f"></div>
</div>
</div>

<div class="section">
<h3>Shirt Fabric</h3>

<div class="colors">
<div class="color" style="background:white" data-type="shirt" data-color="white"></div>
<div class="color" style="background:#87ceeb" data-type="shirt" data-color="#87ceeb"></div>
<div class="color" style="background:#ffc0cb" data-type="shirt" data-color="#ffc0cb"></div>
<div class="color" style="background:#f5deb3" data-type="shirt" data-color="#f5deb3"></div>
</div>
</div>

<div class="section">
<h3>Trouser Fabric</h3>

<div class="colors">
<div class="color" style="background:#2b2b2b" data-type="pants" data-color="#2b2b2b"></div>
<div class="color" style="background:#1f2a44" data-type="pants" data-color="#1f2a44"></div>
<div class="color" style="background:#555" data-type="pants" data-color="#555"></div>
</div>
</div>

<div class="section">
<h3>Lapel Style</h3>

<select id="lapelStyle">
<option value="classic">Classic Notch</option>
<option value="peak">Peak Lapel</option>
<option value="shawl">Shawl Lapel</option>
</select>
</div>

<div class="section">
<h3>Button Color</h3>

<select id="buttonColor">
<option value="gold">Gold</option>
<option value="silver">Silver</option>
<option value="black">Black</option>
<option value="white">White</option>
</select>
</div>

<div class="section">
<h3>Pocket Square</h3>

<select id="pocketSquareSelect">
<option value="red">Red</option>
<option value="blue">Blue</option>
<option value="white">White</option>
<option value="none">None</option>
</select>
</div>

<div class="section">
<h3>Embroidery Initials</h3>

<input id="embroideryInput" placeholder="SV">
</div>

<div class="section">
<h3>Premium Fabric</h3>

<div class="fabricCard">Italian Wool Blend — ₹18,000</div>
<div class="fabricCard">Super 120s Wool — ₹26,000</div>
<div class="fabricCard">Cashmere Blend — ₹39,000</div>

</div>

<button id="saveBtn">SAVE DESIGN</button>

</div>

<div id="viewer">

<div class="price">₹24,999</div>

<div id="avatar">

<div class="shadow"></div>

<div class="head"></div>
<div class="hair"></div>
<div class="neck"></div>

<div class="armLeft"></div>
<div class="armRight"></div>

<div class="handLeft"></div>
<div class="handRight"></div>

<div class="shirt"></div>
<div class="tie"></div>

<div class="blazer">

<div class="lapelLeft"></div>
<div class="lapelRight"></div>

<div class="buttons">
<div class="btn"></div>
<div class="btn"></div>
<div class="btn"></div>
<div class="btn"></div>
</div>

<div class="pocketSquare"></div>
<div class="embroidery">SV</div>

</div>

<div class="pants">

<div class="legLeft">
<div class="shoeLeft"></div>
</div>

<div class="legRight">
<div class="shoeRight"></div>
</div>

</div>

</div>

</div>

</div>

<script>

const avatar = document.getElementById('avatar');

let rotateY = 12;
let rotateX = -4;

let dragging = false;

avatar.style.transform =
`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

avatar.addEventListener('mousedown',(e)=>{

dragging = true;

});

window.addEventListener('mouseup',()=>{

dragging = false;

});

window.addEventListener('mousemove',(e)=>{

if(!dragging) return;

rotateY += e.movementX * 0.5;
rotateX -= e.movementY * 0.2;

avatar.style.transform =
`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

});

const blazer = document.querySelector('.blazer');
const armLeft = document.querySelector('.armLeft');
const armRight = document.querySelector('.armRight');

const shirt = document.querySelector('.shirt');

const legLeft = document.querySelector('.legLeft');
const legRight = document.querySelector('.legRight');

document.querySelectorAll('.color').forEach(color=>{

color.addEventListener('click',()=>{

const type = color.dataset.type;
const value = color.dataset.color;

if(type==='blazer'){

blazer.style.background = value;
armLeft.style.background = value;
armRight.style.background = value;

}

if(type==='shirt'){

shirt.style.background = value;

}

if(type==='pants'){

legLeft.style.background = value;
legRight.style.background = value;

}

});

});

document.getElementById('buttonColor').addEventListener('change',(e)=>{

document.querySelectorAll('.btn').forEach(btn=>{

btn.style.background = e.target.value;

});

});

document.getElementById('embroideryInput').addEventListener('input',(e)=>{

document.querySelector('.embroidery').innerText =
e.target.value;

});

document.getElementById('pocketSquareSelect').addEventListener('change',(e)=>{

const pocket = document.querySelector('.pocketSquare');

if(e.target.value==='none'){

pocket.style.display='none';

}else{

pocket.style.display='block';
pocket.style.background=e.target.value;

}

});

document.getElementById('lapelStyle').addEventListener('change',(e)=>{

const left = document.querySelector('.lapelLeft');
const right = document.querySelector('.lapelRight');

if(e.target.value==='peak'){

left.style.clipPath='polygon(0 0,100% 0,100% 100%)';
right.style.clipPath='polygon(0 0,100% 0,0 100%)';

}

else if(e.target.value==='shawl'){

left.style.borderRadius='40px';
right.style.borderRadius='40px';

}

else{

left.style.clipPath='polygon(0 0,100% 0,0 100%)';
right.style.clipPath='polygon(100% 0,100% 100%,0 0)';
left.style.borderRadius='0';
right.style.borderRadius='0';

}

});

document.getElementById('saveBtn').addEventListener('click',()=>{

alert('Design Saved');

});

</script>

</body>
</html>
