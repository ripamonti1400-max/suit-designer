<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxury Suit Designer 3D</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#111;
  overflow:hidden;
  color:white;
}

#app{
  display:flex;
  height:100vh;
}

#controls{
  width:360px;
  overflow-y:auto;
  background:#1b1b1b;
  padding:25px;
  border-right:1px solid #333;
}

#controls h1{
  margin-bottom:20px;
  font-size:30px;
}

.group{
  margin-bottom:22px;
}

.group h2{
  margin-bottom:10px;
  font-size:16px;
  color:#f5d27d;
}

select,
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2b2b2b;
  color:white;
}

.colors{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.color{
  width:35px;
  height:35px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid white;
}

#viewer{
  flex:1;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#f5d27d;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<div id="controls">

<h1>Luxury Suit Designer</h1>

<div class="group">
<h2>Blazer Color</h2>
<div class="colors blazerColors">
<div class="color" data-type="blazer" data-color="#1f2a44" style="background:#1f2a44"></div>
<div class="color" data-type="blazer" data-color="#000000" style="background:#000000"></div>
<div class="color" data-type="blazer" data-color="#4b4b4b" style="background:#4b4b4b"></div>
<div class="color" data-type="blazer" data-color="#8b4513" style="background:#8b4513"></div>
<div class="color" data-type="blazer" data-color="#355c4b" style="background:#355c4b"></div>
</div>
</div>

<div class="group">
<h2>Pant Color</h2>
<div class="colors pantColors">
<div class="color" data-type="pants" data-color="#1f2a44" style="background:#1f2a44"></div>
<div class="color" data-type="pants" data-color="#000000" style="background:#000000"></div>
<div class="color" data-type="pants" data-color="#777" style="background:#777"></div>
<div class="color" data-type="pants" data-color="#3a3a3a" style="background:#3a3a3a"></div>
</div>
</div>

<div class="group">
<h2>Shirt Color</h2>
<div class="colors shirtColors">
<div class="color" data-type="shirt" data-color="#ffffff" style="background:#ffffff"></div>
<div class="color" data-type="shirt" data-color="#87ceeb" style="background:#87ceeb"></div>
<div class="color" data-type="shirt" data-color="#f5deb3" style="background:#f5deb3"></div>
<div class="color" data-type="shirt" data-color="#ffb6c1" style="background:#ffb6c1"></div>
</div>
</div>

<div class="group">
<h2>Button Color</h2>
<select id="buttonColor">
<option value="#d4af37">Gold</option>
<option value="#c0c0c0">Silver</option>
<option value="#000000">Black</option>
<option value="#ffffff">White</option>
</select>
</div>

<div class="group">
<h2>Button Size</h2>
<input type="range" min="5" max="20" value="10" id="buttonSize"/>
</div>

<div class="group">
<h2>Pant Length</h2>
<select id="pantLength">
<option value="full">Full Length</option>
<option value="ankle">Ankle Cut</option>
<option value="short">Short</option>
</select>
</div>

<div class="group">
<h2>Blazer Collar</h2>
<select id="blazerCollar">
<option value="notch">Notch</option>
<option value="peak">Peak</option>
<option value="shawl">Shawl</option>
</select>
</div>

<div class="group">
<h2>Shirt Collar</h2>
<select id="shirtCollar">
<option value="spread">Spread</option>
<option value="buttondown">Button Down</option>
<option value="mandarin">Mandarin</option>
</select>
</div>

<div class="group">
<h2>Cuff Style</h2>
<select id="cuffStyle">
<option value="standard">Standard</option>
<option value="french">French</option>
<option value="rounded">Rounded</option>
</select>
</div>

<div class="group">
<h2>Shoulder Style</h2>
<select id="shoulderStyle">
<option value="structured">Structured</option>
<option value="natural">Natural</option>
<option value="roped">Roped</option>
</select>
</div>

<div class="group">
<h2>Elbow Pads</h2>
<select id="elbowPads">
<option value="none">None</option>
<option value="brown">Brown</option>
<option value="black">Black</option>
</select>
</div>

<div class="group">
<h2>Blazer Pockets</h2>
<select id="blazerPocket">
<option value="flap">Flap</option>
<option value="patch">Patch</option>
<option value="welt">Welt</option>
</select>
</div>

<div class="group">
<h2>Pant Pockets</h2>
<select id="pantPocket">
<option value="slant">Slant</option>
<option value="straight">Straight</option>
<option value="none">None</option>
</select>
</div>

<div class="group">
<h2>Pocket Square</h2>
<select id="pocketSquare">
<option value="none">None</option>
<option value="red">Red</option>
<option value="blue">Blue</option>
<option value="white">White</option>
</select>
</div>

<div class="group">
<h2>Embroidery Logo</h2>
<input type="text" id="logoText" placeholder="Enter initials"/>
</div>

<button id="saveDesign">Save Design</button>

</div>

<div id="viewer"></div>

</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
45,
(window.innerWidth-360)/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1.5,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth-360, window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(3,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,1));

const bodyGroup = new THREE.Group();
scene.add(bodyGroup);

const skinMaterial = new THREE.MeshStandardMaterial({color:0xf2c9a0});

const head = new THREE.Mesh(
new THREE.SphereGeometry(0.55,32,32),
skinMaterial
);

head.position.y = 3;
bodyGroup.add(head);

const shirtMaterial = new THREE.MeshStandardMaterial({color:0xffffff});
const blazerMaterial = new THREE.MeshStandardMaterial({color:0x1f2a44});
const pantMaterial = new THREE.MeshStandardMaterial({color:0x222222});

const torso = new THREE.Mesh(
new THREE.BoxGeometry(1.5,2.2,0.9),
shirtMaterial
);

torso.position.y = 1.3;
bodyGroup.add(torso);

const blazer = new THREE.Mesh(
new THREE.BoxGeometry(1.8,2.4,1),
blazerMaterial
);

blazer.position.y = 1.3;
bodyGroup.add(blazer);

const leftArm = new THREE.Mesh(
new THREE.BoxGeometry(0.45,2,0.45),
blazerMaterial
);

leftArm.position.set(-1.2,1.3,0);
bodyGroup.add(leftArm);

const rightArm = leftArm.clone();
rightArm.position.x = 1.2;
bodyGroup.add(rightArm);

const leftLeg = new THREE.Mesh(
new THREE.BoxGeometry(0.6,2,0.6),
pantMaterial
);

leftLeg.position.set(-0.4,-1,0);
bodyGroup.add(leftLeg);

const rightLeg = leftLeg.clone();
rightLeg.position.x = 0.4;
bodyGroup.add(rightLeg);

const buttons = [];

for(let i=0;i<4;i++){

const btn = new THREE.Mesh(
new THREE.SphereGeometry(0.06,32,32),
new THREE.MeshStandardMaterial({color:0xd4af37})
);

btn.position.set(0,1.8 - i*0.4,0.52);

buttons.push(btn);
bodyGroup.add(btn);

}

const pocketSquare = new THREE.Mesh(
new THREE.BoxGeometry(0.25,0.15,0.02),
new THREE.MeshStandardMaterial({color:0xffffff})
);

pocketSquare.position.set(0.45,2,0.55);
bodyGroup.add(pocketSquare);

const logoCanvas = document.createElement('canvas');
logoCanvas.width = 256;
logoCanvas.height = 128;

const ctx = logoCanvas.getContext('2d');
ctx.fillStyle = 'white';
ctx.font = '50px Arial';
ctx.fillText('SV',50,70);

const logoTexture = new THREE.CanvasTexture(logoCanvas);

const logoPlane = new THREE.Mesh(
new THREE.PlaneGeometry(0.5,0.25),
new THREE.MeshBasicMaterial({
map:logoTexture,
transparent:true
})
);

logoPlane.position.set(-0.45,2,0.55);
bodyGroup.add(logoPlane);

function updateLogo(text){

ctx.clearRect(0,0,256,128);
ctx.fillStyle='white';
ctx.font='50px Arial';
ctx.fillText(text,40,70);
logoTexture.needsUpdate = true;

}

document.querySelectorAll(".color").forEach(btn=>{

btn.addEventListener("click",()=>{

const type = btn.dataset.type;
const color = btn.dataset.color;

if(type==="blazer"){

blazer.material.color.set(color);
leftArm.material.color.set(color);
rightArm.material.color.set(color);

}

if(type==="pants"){

leftLeg.material.color.set(color);
rightLeg.material.color.set(color);

}

if(type==="shirt"){

torso.material.color.set(color);

}

});

});

document.getElementById("buttonColor").addEventListener("change",(e)=>{

buttons.forEach(btn=>{
btn.material.color.set(e.target.value);
});

});

document.getElementById("buttonSize").addEventListener("input",(e)=>{

buttons.forEach(btn=>{

btn.scale.setScalar(e.target.value/10);

});

});

document.getElementById("pantLength").addEventListener("change",(e)=>{

if(e.target.value==="ankle"){

leftLeg.scale.y = 0.8;
rightLeg.scale.y = 0.8;

}

else if(e.target.value==="short"){

leftLeg.scale.y = 0.6;
rightLeg.scale.y = 0.6;

}

else{

leftLeg.scale.y = 1;
rightLeg.scale.y = 1;

}

});

document.getElementById("shoulderStyle").addEventListener("change",(e)=>{

if(e.target.value==="roped"){

leftArm.position.y = 1.5;
rightArm.position.y = 1.5;

}

else if(e.target.value==="natural"){

leftArm.position.y = 1.1;
rightArm.position.y = 1.1;

}

else{

leftArm.position.y = 1.3;
rightArm.position.y = 1.3;

}

});

document.getElementById("elbowPads").addEventListener("change",(e)=>{

if(e.target.value==="none") return;

const padColor = e.target.value==="brown" ? 0x8b4513 : 0x000000;

const padGeo = new THREE.SphereGeometry(0.15,32,32);
const padMat = new THREE.MeshStandardMaterial({color:padColor});

const leftPad = new THREE.Mesh(padGeo,padMat);
leftPad.position.set(-1.2,0.8,0.3);

const rightPad = new THREE.Mesh(padGeo,padMat);
rightPad.position.set(1.2,0.8,0.3);

bodyGroup.add(leftPad);
bodyGroup.add(rightPad);

});

document.getElementById("pocketSquare").addEventListener("change",(e)=>{

if(e.target.value==="none"){

pocketSquare.visible = false;
return;

}

pocketSquare.visible = true;

const colors = {
red:"#ff0000",
blue:"#0000ff",
white:"#ffffff"
};

pocketSquare.material.color.set(colors[e.target.value]);

});

document.getElementById("logoText").addEventListener("input",(e)=>{

updateLogo(e.target.value);

});

document.getElementById("saveDesign").addEventListener("click",()=>{

const screenshot = renderer.domElement.toDataURL("image/png");

localStorage.setItem("customSuitScreenshot", screenshot);

alert("Design Saved");

});

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = (window.innerWidth-360)/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth-360, window.innerHeight);

});

</script>

</body>
</html>
